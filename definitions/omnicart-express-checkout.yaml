name: "omnicart-express-checkout"
description: "OmniCart Express Checkout — single-page cart → shipping → payment → confirmation storefront checkout (OmniCart whitelabel; built on the Medusa commerce framework + Stripe)"
base_reference: "vite-reference"
projectType: app

# OmniCart is the whitelabel commerce brand. Internally it is powered by the
# Medusa commerce framework (the @medusajs/medusa-js SDK talks to a Medusa /
# OmniCart backend) and Stripe for payments. Keep user-facing naming as
# "OmniCart"; "Medusa" appears only as the internal framework reference.
package_patches:
  name: "omnicart-express-checkout"
  dependencies:
    "@medusajs/medusa-js": "^6.1.7"
    "@stripe/stripe-js": "^4.10.0"
    "@stripe/react-stripe-js": "^2.9.0"
